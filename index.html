<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day009 — Analogy Spark Lab</title>
  <meta name="description" content="難しい話題を比喩で伝えやすくする発想支援ツール。（話題:HN Frontpage）">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <div id="app">

          <label class="input-label">比喩セット</label>
          <div id="toolOutput" class="output-area"></div>

    </main>
    <footer class="app-footer">

      <a href="https://github.com/ryo909/ai-dev-day-009" target="_blank" rel="noopener">GitHub</a>
